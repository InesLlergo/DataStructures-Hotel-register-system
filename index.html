<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Hotel Transylvania - Sistema de Gestión</title>
    <style>
        :root {
            /* Paleta de colores: Blanco, Gris claro y Azul Cielo */
            --primary-blue: #007bbd;
            --light-blue: #add8e6;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #d1d8e0;
            --danger: #e74c3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 90%;
            max-width: 850px;
            background: var(--card-bg);
            border: 4px solid var(--border-color);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
            padding: 30px;
            border-radius: 4px;
        }

        .header-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-bottom: 4px solid var(--light-blue);
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 18px; 
            text-align: center; 
            color: var(--primary-blue);
            margin-bottom: 30px;
        }

        /* --- GRID DE HABITACIONES --- */
        .grid-habitaciones {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .hab {
            padding: 15px;
            border: 2px solid var(--border-color);
            text-align: center;
            font-size: 8px;
            background-color: #fafafa;
        }
        .libre { color: #2ecc71; background-color: #ebfaef; border-color: #2ecc71; }
        .ocupada { color: var(--danger); background-color: #fdeaea; border-color: var(--danger); }

        /* --- MENÚ --- */
        .menu { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 10px; 
            justify-content: center; 
            margin: 25px 0; 
        }
        
        button {
            background: var(--light-blue);
            color: var(--primary-blue);
            border: 2px solid var(--primary-blue);
            padding: 12px;
            font-family: 'Press Start 2P';
            font-size: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { 
            background: var(--primary-blue); 
            color: white; 
        }

        /* --- VISTAS --- */
        .view { 
            display: none; 
            background: #fff;
            border: 2px solid var(--light-blue);
            padding: 20px;
            margin-top: 10px;
        }
        .active { display: block; }

        label { font-size: 8px; color: #666; }

        input {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            font-family: 'Press Start 2P';
            font-size: 9px;
            width: 90%;
            margin: 10px 0 20px 0;
            outline: none;
        }
        input:focus { border-color: var(--primary-blue); }

        .result-box {
            font-size: 9px;
            padding: 15px;
            background: #f0f8ff;
            border-left: 4px solid var(--primary-blue);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="HOTEL.jpeg" alt="Hotel" class="header-img">
        
        <h1>[ RECEPTION DESK ]</h1>

        <div class="grid-habitaciones" id="gridHab"></div>

        <div class="menu">
            <button onclick="showView('vRegistro')">1. REGISTRO</button>
            <button onclick="showView('vBusqueda')">2. BÚSQUEDA</button>
            <button onclick="showView('vBaja')">3. BAJA</button>
            <button onclick="showView('vAdmin')">4. ADMIN</button>
        </div>

        <div id="vRegistro" class="view">
            <h3>CHECK-IN</h3>
            <label>NOMBRE DEL CLIENTE:</label>
            <input type="text" id="regNombre">
            <label>HUÉSPEDES (1-6):</label>
            <input type="number" id="regCant" min="1" max="6">
            <label>NOCHES DE ESTANCIA:</label>
            <input type="number" id="regNoches" min="1">
            <button onclick="registrar()">CONFIRMAR RESERVA</button>
        </div>

        <div id="vBusqueda" class="view">
            <h3>CONSULTA DE HABITACIÓN</h3>
            <input type="number" id="busqHab" placeholder="NÚMERO DE HAB.">
            <button onclick="buscar()">CONSULTAR</button>
            <div id="resBusqueda" class="result-box" style="display:none;"></div>
        </div>

        <div id="vBaja" class="view">
            <h3>CHECK-OUT</h3>
            <input type="number" id="bajaHab" placeholder="HABITACIÓN A LIBERAR">
            <button onclick="darBaja()" style="border-color: var(--danger); color: var(--danger);">LIBERAR</button>
        </div>

        <div id="vAdmin" class="view">
            <h3>ADMIN PANEL</h3>
            <div id="resAdmin" class="result-box"></div>
        </div>
    </div>

    <script>
        let habitaciones = [0,0,0,0,0,0,0,0,0];
        let listaNodos = [];

        function render() {
            const grid = document.getElementById('gridHab');
            grid.innerHTML = '';
            habitaciones.forEach((estado, i) => {
                grid.innerHTML += `<div class="hab ${estado===0?'libre':'ocupada'}">H${i+1}<br>${estado===0?'LIBRE':'CHECKED'}</div>`;
            });
        }

        function showView(id) {
            if(id === 'vAdmin') {
                let pass = prompt("CONTRASEÑA ADMIN:");
                if(pass !== "123") return alert("ACCESO DENEGADO");
                actualizarAdmin();
            }
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function registrar() {
            let nom = document.getElementById('regNombre').value;
            let cant = parseInt(document.getElementById('regCant').value);
            let n = parseInt(document.getElementById('regNoches').value);
            if(!nom || !cant || !n) return alert("COMPLETE TODOS LOS CAMPOS");

            let habAsig = -1;
            if(cant === 1) { 
                for(let i=0; i<3; i++) if(habitaciones[i] === 0) { habAsig = i; break; }
            } else if(cant === 2) {
                for(let i=3; i<6; i++) if(habitaciones[i] === 0) { habAsig = i; break; }
            } else if(cant >= 3 && cant <= 6) {
                for(let i=6; i<9; i++) if(habitaciones[i] === 0) { habAsig = i; break; }
            }

            if(habAsig !== -1) {
                habitaciones[habAsig] = 1;
                let costo = cant === 1 ? 1000 : (cant === 2 ? 1500 : 500);
                listaNodos.push({ nombre: nom, hab: habAsig+1, noches: n, total: costo * n });
                alert("REGISTRO EXITOSO EN HABITACIÓN H" + (habAsig+1));
                render();
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            } else {
                alert("SIN DISPONIBILIDAD PARA ESTA CAPACIDAD");
            }
        }

        function buscar() {
            let h = parseInt(document.getElementById('busqHab').value);
            let hsd = listaNodos.find(x => x.hab === h);
            let div = document.getElementById('resBusqueda');
            div.style.display = "block";
            div.innerHTML = hsd ? `CLIENTE: ${hsd.nombre}<br>ESTANCIA: ${hsd.noches} NOCHES<br>TOTAL: $${hsd.total}` : "ESTADO: HABITACIÓN NO OCUPADA";
        }

        function darBaja() {
            let h = parseInt(document.getElementById('bajaHab').value);
            if(habitaciones[h-1] === 1) {
                habitaciones[h-1] = 0;
                listaNodos = listaNodos.filter(x => x.hab !== h);
                alert("HABITACIÓN H" + h + " LIBERADA CORRECTAMENTE");
                render();
            } else { alert("LA HABITACIÓN YA SE ENCUENTRA VACÍA"); }
        }

        function actualizarAdmin() {
            let total = 0;
            let html = "<strong>LISTA DE HUÉSPEDES:</strong><br><br>";
            listaNodos.forEach(h => {
                total += h.total;
                html += `H${h.hab}: ${h.nombre} - $${h.total}<br>`;
            });
            html += `<br><strong>TOTAL EN CAJA: $${total}</strong>`;
            document.getElementById('resAdmin').innerHTML = html;
        }

        render();
    </script>
</body>
</html>
